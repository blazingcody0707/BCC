name: Winlator Rootfs Base Build Contaienr ARM64

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:

jobs:
  archlinux:
    runs-on: ubuntu-24.04-arm
    steps:
    #   - name: Clone repo
    #     uses: actions/checkout@v5
    #     with:
    #       sparse-checkout: |
    #         arch-bootstrap.sh
    #         Wlt-bcc.sh
    #         mount.sh


      - name: Setting chroot
        run: |
          cd /tmp
          git clone https://github.com/Waim908/BCC BCC
          # sudo apt update
          aria2c -s16 -x16 https://github.com/Waim908/BCC/releases/download/archlinux-latest/archlinux-latest.tar.xz
          tar xf archlinux-latest.tar.xz
          # sudo apt install debootstrap -y
          cp /tmp/BCC/Wlt-bcc.sh /tmp
          cp /tmp/BCC/mount.sh /tmp
          bash mount.sh mount archlinux
          chmod 777 Wlt-bcc.sh
          sudo cp Wlt-bcc.sh archlinux/bin/
          sudo chroot archlinux /bin/Wlt-bcc.sh &&
          cd /tmp
          bash mount.sh unmount archlinux

      - name: Package
        run: |
          cd /tmp
          sudo tar -I 'xz -T$(nproc)' -cvf wlt-bcc.tar.xz archlinux

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: Winlator BCC
          draft: false
          prerelease: false
          tag_name: wlt-bcc-latest
          body: |
            winlator rootfs BCC
          files: /tmp/wlt-bcc.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
